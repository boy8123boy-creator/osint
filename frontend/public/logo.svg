<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#39ff14;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Shield -->
  <path d="M50 8 L85 25 L85 55 Q85 75 50 92 Q15 75 15 55 L15 25 Z" 
        fill="none" stroke="url(#g)" stroke-width="2.5" filter="url(#glow)"/>
  <!-- Eye -->
  <ellipse cx="50" cy="48" rx="18" ry="12" fill="none" stroke="#00f0ff" stroke-width="2" filter="url(#glow)"/>
  <circle cx="50" cy="48" r="5" fill="#39ff14" filter="url(#glow)"/>
  <!-- Scan lines -->
  <line x1="32" y1="35" x2="68" y2="35" stroke="#00f0ff" stroke-width="0.5" opacity="0.5"/>
  <line x1="28" y1="48" x2="72" y2="48" stroke="#39ff14" stroke-width="0.5" opacity="0.5"/>
  <line x1="32" y1="61" x2="68" y2="61" stroke="#00f0ff" stroke-width="0.5" opacity="0.5"/>
</svg>
